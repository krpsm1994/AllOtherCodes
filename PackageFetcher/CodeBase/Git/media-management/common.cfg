<!-- ======================================================================= -->
<!-- master.cfg                                                              -->
<!--                                                                         -->
<!-- This config file defines global properties and files needed for the     -->
<!-- build process.                                                          -->
<!--    			                                                              -->
<!-- ======================================================================= -->
<project name="common-config">
    <!-- =================================================================== -->
    <!-- Global properties.                                                  -->
    <!-- =================================================================== -->

	<property name="java.target"          value="21" />
    <property name="java.source"          value="21" />

    <property name="master.lib.dir"           		value="${basedir}/../lib"/>
	<property name="master.lib.tools.dir"     		value="${master.lib.dir}/tools"/>
	<property name="master.lib.build.dir"     		value="${master.lib.dir}/build"/>
	<property name="master.lib.deploy.dir"    		value="${master.lib.dir}/deploy"/>
	<property name="master.lib.artesia.dir"   		value="${master.lib.deploy.dir}/artesia"/>
	<property name="artesia-ear.dir"      		    value="${basedir}/../server/ear/artesia.ear"/>
	<property name="artesia-ear.lib.dir"      		value="${artesia-ear.dir}/lib"/>
	<property name="artesia-ear.war.dir"      		value="${artesia-ear.dir}/war"/>
	<property name="artesia-ear.ejb.dir"      		value="${artesia-ear.dir}/ejb"/>
	<property name="master.lib.artesia-ear.dir"   	value="${artesia-ear.lib.dir}/artesia"/>
	<property name="master.dist.dir"          		value="${basedir}/../dist"/>
	<property name="compile.lib.dir"          		value="${basedir}/lib"/>
	<property name="emma.lib.dir"          		value="${master.lib.tools.dir}/emma"/>
	<property name="instrument.dir"			    value="${basedir}/../instrument"	/>
	<property name="restapi.dir"			    value="${basedir}/../restapi"	/>
	   
	
	<property name="tools.lib"	value="${basedir}/../tools/lib" />
    
	<!-- jar names used in multiple projects-->
    <property name="ws.api.jar.name"	            value="ot-websockets.jar" />

    <!-- jar manifest info -->
    <property name="manifest.vendor" value="OpenText"/>
    <property name="manifest.spec.version" value="26.2"/>
    <property name="manifest.impl.version" value="26.2 build ${build.number}"/>

    <!-- Compilation switches -->
	<property name="compile.debug"         value="on"  />
	<property name="compile.optimize"      value="off" />
	<property name="compile.deprecation"   value="off"  />
	<property name="compile.verbose"       value="off" />
	<property name="compile.nowarn"	      value="on"  />
	
	<!-- Runtime switches-->
	
	<path id="common.build.class.path">
		<fileset dir="${compile.lib.dir}"         includes="*" />		
		<fileset dir="${master.lib.build.dir}"		includes="**/*" />
		<fileset dir="${master.lib.deploy.dir}"	includes="**/*.jar" />
		<fileset dir="${master.lib.artesia.dir}"	includes="otmm-common-lib*.jar" />
		<pathelement location="${conf.dir}"/>
	</path>
	
	<path id="common.run.class.path">
	   <fileset dir="${compile.lib.dir}"         includes="*" />
      <fileset dir="${master.lib.deploy.dir}"	includes="**/*" />
      <fileset dir="${master.dist.dir}"	includes="*" />
	  <pathelement location="${conf.dir}"/>
	</path>
	
	<path id="common.boot.class.path">
	</path>   
</project>
