######################################################################
######################################################################
############## DAMLink Product Workspace Configuration ###############
######################################################################
######################################################################
otdcpw.ui.isInitialized=true
otdcpw.ui.pim.connectionId=
otdcpw.ui.pim.systemId=
otdcpw.pim.catalog.version=Staged
##################################################
########### ROOT Folder Config ###################
##################################################
otdcpw.rootFolder.securityPolicies=1
otdcpw.rootFolder.name=Product Dashboard
otdcpw.rootFolder.folderTypeId=ARTESIA.BASIC.FOLDER
otdcpw.ui.rootFolder.id=a3d024c296993bda69711f74954ee4cc6b1066c3
##################################################
########### Product Workspace Config #############
##################################################
otdcpw.workspace.folderType.name=Product Workspace
otdcpw.workspace.folderType.desc=Product Workspace folder type
otdcpw.ui.workspace.folderType.id=OTDC.PW.FOLDER
#Don't change
otdcpw.ui.workspace.model=OTDC.PW.MODEL
otdcpw.ui.facetConfig=OTDC.PW.FACET.CONFIG
otdcpw.ui.assetFacetConfig=OTDC.PW.ASSET.FACET.CONFIG

#Subfolder configuration
otdcpw.ui.workspace.subfolder.0.name=Media Library
otdcpw.ui.workspace.subfolder.0.folderTypeId=ARTESIA.BASIC.FOLDER

#Product search configuration
otdcpw.ui.pim.search.typeahead.minLength=3
otdcpw.ui.pim.search.typeahead.maxSuggestions=50

#Assign to product configuration
otdcpw.ui.assignToProduct.maxWorkspaces=10

#Mark for assignment configuration
otdcpw.ui.markForAssign.maxProducts=100
#syntax=MetadataTableFieldId/TableId[FieldGroupId]
otdcpw.ui.pim.markForAssign.fieldMap.code=AUTO.TABULAR.GROUP/AUTO.TABULAR.PRODUCT ID[OTDC.PW.ASSET.FG.ASSIGNMENT]
otdcpw.ui.pim.markForAssign.fieldMap.systemId=AUTO.TABULAR.GROUP/AUTO.TABULAR.SYSTEM ID[OTDC.PW.ASSET.FG.ASSIGNMENT]
otdcpw.ui.pim.markForAssign.fieldMap.attrId=AUTO.TABULAR.GROUP/AUTO.TABULAR.ATTRIBUTE ID[OTDC.PW.ASSET.FG.ASSIGNMENT]
#singleSelectablePIMPosition format: picture,logo,thumbnail
otdcpw.ui.pim.markForAssign.singleSelectablePIMPosition=

otdcpw.ui.pim.mediaAttr.defaultLookupTable=OTDC.PW.ASSET.MEDIAATTR.LOOKUP
otdcpw.ui.pim.mediaAttr.fieldId=OTDC.PW.ASSET.PIMMEDIAATTR[OTDC.PW.ASSET.FG.ASSIGNMENT]
##################################################
###########     PIM Field Mapping    #############
##################################################
otdcpw.pim.fieldMap.pk=OTDC.PW.PK
otdcpw.pim.fieldMap.catalogVersion=OTDC.PW.CATALOGVERSION
otdcpw.pim.fieldMap.approvalStatus=OTDC.PW.PRODUCT.STATE
otdcpw.pim.fieldMap.name=OTDC.PW.IDENTIFIER
otdcpw.pim.fieldMap.code=OTDC.PW.ARTICLE.NUMBER
otdcpw.pim.fieldMap.description=OTDC.PW.DESCRIPTION
otdcpw.pim.fieldMap.summary=OTDC.PW.SUMMARY
otdcpw.pim.fieldMap.ean=OTDC.PW.EAN
otdcpw.pim.fieldMap.manufacturerName=OTDC.PW.MANUFACTURER
otdcpw.pim.fieldMap.onlineDate=OTDC.PW.DATE.FROM
otdcpw.pim.fieldMap.offlineDate=OTDC.PW.DATE.TO
otdcpw.pim.fieldMap.variantCode=OTDC.PW.TF.VARIANTCODE
otdcpw.pim.fieldMap.variantIdentifier=OTDC.PW.TF.VARIANTIDENTIFIER
otdcpw.pim.fieldMap.variantAttrs=OTDC.PW.TF.VARIANTATTRS
